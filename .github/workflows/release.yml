# Builds the desktop app for macOS + Windows and publishes a GitHub Release
# whenever a version tag (v1.2.3) is pushed. The published release is what
# the in-app updater checks against.
#
# Release procedure (from your machine):
#   npm version patch        # bumps package.json + creates the git tag
#   git push --follow-tags   # CI does the rest
name: Release desktop app

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      # Run one platform at a time. Both jobs publish to the same GitHub
      # release, and if they run in parallel they race to *create* it — the
      # loser gets "422 already_exists" and fails. Serializing means the first
      # job creates the release and the second just uploads to it.
      max-parallel: 1
      # Don't let one platform's failure cancel the other mid-build.
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --mac
          - os: windows-latest
            args: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Package and publish
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
